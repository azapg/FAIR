<!doctype html>
<html lang="en">
  <body>
    <h1>Password reset request</h1>
    <p>Hello {{ user.name }},</p>
    <p>We received a request to reset your FAIR account password.</p>
    <p>Your reset token is:</p>
    <pre>{{ token }}</pre>
    <p>If you did not request this, you can ignore this email.</p>
  </body>
</html>
